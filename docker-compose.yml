services:
  postgres:
    image: postgres:16-alpine
    container_name: drshoes-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Lmp61430
      POSTGRES_DB: drshoes
    ports:
      - "5432:5432"
    volumes:
      - drshoes_pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: drshoes-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - drshoes_minio_data:/data

volumes:
  drshoes_pg_data:
  drshoes_minio_data:
